      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_PAYSTACK_PUBLIC_KEY
    value: pk_live_0824b60f0c0e7b10be0d8e4e0c74d229596e836c
    availability:
      - BUILD
      - RUNTIME

  # ─── Secrets (stored in Google Cloud Secret Manager) ───────────
  - variable: DATABASE_URL
    secret: DATABASE_URL
    availability:
      - BUILD
      - RUNTIME

  - variable: JWT_SECRET
    secret: JWT_SECRET

  - variable: CLINIC_ID
    secret: CLINIC_ID

  - variable: REDIS_URL
    secret: REDIS_URL

  - variable: FIREBASE_STORAGE_BUCKET
    secret: FIREBASE_STORAGE_BUCKET

  - variable: RESEND_API_KEY
    secret: RESEND_API_KEY

  - variable: EMAIL_FROM
