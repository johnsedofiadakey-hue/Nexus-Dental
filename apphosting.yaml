  - variable: HUBTEL_CLIENT_ID
    secret: HUBTEL_CLIENT_ID

  - variable: HUBTEL_CLIENT_SECRET
    secret: HUBTEL_CLIENT_SECRET

  - variable: HUBTEL_SENDER_ID
    secret: HUBTEL_SENDER_ID

  - variable: HUBTEL_WHATSAPP_NUMBER
    secret: HUBTEL_WHATSAPP_NUMBER
