    value: production
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_API_URL
    value: https://nexusdental--nexusdentalsystem.us-east4.hosted.app
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_APP_URL
    value: https://nexusdental--nexusdentalsystem.us-east4.hosted.app
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_GOOGLE_CLIENT_ID
    value: 871183265953-i9ctm5b8jck6er4ah22c9cs24g55i4fq.apps.googleusercontent.com
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    value: AIzaSyCpFe20EmaY_2xQNoX7V97PCyzBoXtZfK4
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: nexusdentalsystem.firebaseapp.com
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: nexusdentalsystem
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    value: "1:871183265953:web:fb0e52c47d8d599e9600e0"
